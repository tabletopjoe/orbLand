<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroCurse</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <canvas id="canvas"></canvas>
    <div class="icon-strip">
      <button type="button" id="planet-speed-icon" class="icon-btn" aria-label="Planet speed" title="Planet speed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/><path d="M12 6v6l4 2"/></svg>
      </button>
      <button type="button" id="moon-speed-icon" class="icon-btn" aria-label="Moon speed" title="Moon speed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="6"/><path d="M12 8v4l3 2"/></svg>
      </button>
      <button type="button" id="trails-icon" class="icon-btn" aria-label="Orbit trails" title="Orbit trails">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 1 0 20" stroke-dasharray="2 2"/><path d="M12 2a10 10 0 0 0 0 20" stroke-dasharray="2 2"/></svg>
      </button>
      <button type="button" id="tilt-icon" class="icon-btn" aria-label="Elliptical tilt" title="Elliptical tilt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="6" transform="rotate(-30 12 12)"/></svg>
      </button>
      <button type="button" id="radius-icon" class="icon-btn" aria-label="Orbit radius" title="Orbit radius">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="12" x2="12" y2="2"/></svg>
      </button>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
