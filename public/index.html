<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>orbLand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>
  <div class="landing-shell">
    <canvas id="landing-canvas" role="img" aria-label="Chromatic rings background"></canvas>
    <nav class="landing-link-panel" id="landing-link-panel" aria-label="Quick links">
      <a href="#" class="landing-link" id="landing-link-consulting">CONSULTING</a>
      <a href="#" class="landing-link" id="landing-link-about">ABOUT</a>
      <a href="/orbs" class="landing-link">ORBS</a>
      <a href="#" class="landing-link" hidden>MEASURES</a>
      <a href="#" class="landing-link" hidden>STARS</a>
      <a href="#" class="landing-link" hidden>PLACEHOLDER</a>
      <a href="#" class="landing-link" hidden>PLACEHOLDER</a>
    </nav>
  </div>
  <div
    class="landing-slider-float landing-slider-float--controls-hidden"
    id="landing-slider-float"
    aria-label="Ring controls"
  >
    <button
      type="button"
      class="landing-controls-toggle"
      id="landing-controls-toggle"
      aria-expanded="false"
      aria-controls="landing-slider-controls"
      aria-label="Show ring controls"
    >
      <span class="landing-controls-visibility-icon-slot" aria-hidden="true">
        <svg class="landing-controls-visibility-icon landing-controls-visibility-icon--full" width="20.328" height="41.382" viewBox="0 -2 42 85.5" fill="none" stroke-linecap="round" stroke-linejoin="round" overflow="visible"><circle cx="21" cy="41.25" r="20" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <svg class="landing-controls-visibility-icon landing-controls-visibility-icon--pill" width="20.328" height="41.382" viewBox="0 -2 42 85.5" fill="none" stroke-linecap="round" stroke-linejoin="round" overflow="visible">
          <rect x="2.4" y="0" width="37.2" height="82.5" rx="18.6" ry="18.6" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="21" cy="24.25" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="21" cy="58.25" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
    </button>
    <div class="landing-slider-controls" id="landing-slider-controls">
      <div class="landing-slider-cell landing-slider-cell--size">
        <label for="landing-ring-size-slider">Size</label>
        <div class="landing-size-and-spectrum">
          <div
            class="landing-spectrum-swatches"
            role="radiogroup"
            aria-label="Chromatic band colors"
          >
            <button
              type="button"
              class="landing-spectrum-swatch landing-spectrum-swatch--cool"
              data-spectrum="0"
              role="radio"
              aria-checked="true"
              title="Blue through magenta (default)"
            >
              <span class="visually-hidden">Blue through magenta</span>
            </button>
            <button
              type="button"
              class="landing-spectrum-swatch landing-spectrum-swatch--warm"
              data-spectrum="1"
              role="radio"
              aria-checked="false"
              title="Yellow through dark red"
            >
              <span class="visually-hidden">Yellow through dark red</span>
            </button>
            <button
              type="button"
              class="landing-spectrum-swatch landing-spectrum-swatch--jungle"
              data-spectrum="2"
              role="radio"
              aria-checked="false"
              title="Lime through jungle green"
            >
              <span class="visually-hidden">Lime through jungle green</span>
            </button>
          </div>
          <div class="landing-slider-wrap">
            <input
              type="range"
              id="landing-ring-size-slider"
              class="landing-vertical-slider"
              min="25"
              max="300"
              value="100"
              step="1"
              aria-label="Overall chromatic ring size"
            />
          </div>
        </div>
        <div
          class="landing-ring-size-pct"
          id="landing-ring-size-pct"
          aria-live="polite"
        >
          100%
        </div>
      </div>
      <div class="landing-slider-cell">
        <label for="landing-gear-main-speed">Tonic gear</label>
        <div class="landing-slider-wrap">
          <input
            type="range"
            id="landing-gear-main-speed"
            class="landing-vertical-slider"
            min="-5"
            max="5"
            value="3"
            step="1"
            aria-label="Tonic gear: minutes per orbit (negative reverses, zero stops)"
          />
        </div>
        <div
          class="landing-ring-size-pct landing-gear-speed-readout"
          id="landing-gear-main-speed-readout"
          aria-live="polite"
        >
          3 min
        </div>
      </div>
      <div class="landing-slider-cell">
        <label for="landing-gear-tonic-child-speed">Tonic spoke</label>
        <div class="landing-slider-wrap">
          <input
            type="range"
            id="landing-gear-tonic-child-speed"
            class="landing-vertical-slider"
            min="-5"
            max="5"
            value="3"
            step="1"
            aria-label="Tonic spoke period from this slider only (up to 3 min at ±5). Additive to main gear track roll — set Tonic gear to 0 min to isolate. Negative reverses, zero stops."
          />
        </div>
        <div
          class="landing-ring-size-pct landing-gear-speed-readout"
          id="landing-gear-tonic-child-speed-readout"
          aria-live="polite"
        >
          1.8 min
        </div>
      </div>
      <div class="landing-slider-cell">
        <label for="landing-gear-tonic-grandchild-speed">Tonic grandchild</label>
        <div class="landing-slider-wrap">
          <input
            type="range"
            id="landing-gear-tonic-grandchild-speed"
            class="landing-vertical-slider"
            min="-1"
            max="1"
            value="0.5"
            step="0.1"
            aria-label="Tonic grandchild: orbit period is 15× slider magnitude in seconds (±1 → up to 15 s; negative reverses)"
          />
        </div>
        <div
          class="landing-ring-size-pct landing-gear-speed-readout"
          id="landing-gear-tonic-grandchild-speed-readout"
          aria-live="polite"
        >
          7.5 s
        </div>
      </div>
      <div class="landing-slider-cell">
        <label for="landing-gear-fifth-speed">Fifth gear</label>
        <div class="landing-slider-wrap">
          <input
            type="range"
            id="landing-gear-fifth-speed"
            class="landing-vertical-slider"
            min="-5"
            max="5"
            value="3"
            step="1"
            aria-label="Fifth orbit gear: minutes per orbit (negative reverses, zero stops)"
          />
        </div>
        <div
          class="landing-ring-size-pct landing-gear-speed-readout"
          id="landing-gear-fifth-speed-readout"
          aria-live="polite"
        >
          3 min
        </div>
      </div>
      <div class="landing-slider-cell">
        <label for="landing-gear-fifth-child-speed">Fifth child</label>
        <div class="landing-slider-wrap">
          <input
            type="range"
            id="landing-gear-fifth-child-speed"
            class="landing-vertical-slider"
            min="-5"
            max="5"
            value="1"
            step="1"
            aria-label="Fifth mini gear child: minutes per orbit (negative reverses, zero stops)"
          />
        </div>
        <div
          class="landing-ring-size-pct landing-gear-speed-readout"
          id="landing-gear-fifth-child-speed-readout"
          aria-live="polite"
        >
          1 min
        </div>
      </div>
      <div class="landing-slider-cell">
        <label for="landing-gear-twelfth-speed">12th band</label>
        <div class="landing-slider-wrap">
          <input
            type="range"
            id="landing-gear-twelfth-speed"
            class="landing-vertical-slider"
            min="-5"
            max="5"
            value="3"
            step="1"
            aria-label="12th band orbit gear: minutes per orbit (negative reverses, zero stops)"
          />
        </div>
        <div
          class="landing-ring-size-pct landing-gear-speed-readout"
          id="landing-gear-twelfth-speed-readout"
          aria-live="polite"
        >
          3 min
        </div>
      </div>
    </div>
  </div>
  <div
    id="landing-contact-tooltip"
    class="landing-contact-tooltip"
    role="tooltip"
    hidden
  ></div>
  <script src="/js/landing.js"></script>
</body>
</html>
