<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>orbLand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <canvas id="canvas"></canvas>
    <div class="slider-float">
      <div class="slider-cell">
        <label for="speed-multiplier-slider">All</label>
        <div class="slider-wrap"><input type="range" id="speed-multiplier-slider" class="vertical-slider" min="0" max="200" value="100" aria-label="All orbital speed"></div>
      </div>
      <div class="slider-cell">
        <label for="planet-speed-slider">Planet</label>
        <div class="slider-wrap"><input type="range" id="planet-speed-slider" class="vertical-slider" min="5" max="50" value="10" aria-label="Planet speed"></div>
      </div>
      <div class="slider-cell">
        <label for="moon-speed-slider">Moon</label>
        <div class="slider-wrap"><input type="range" id="moon-speed-slider" class="vertical-slider" min="10" max="100" value="30" aria-label="Moon speed"></div>
      </div>
      <div class="slider-cell">
        <label for="trails-slider">Trails</label>
        <div class="slider-wrap"><input type="range" id="trails-slider" class="vertical-slider" min="0" max="100" value="100" aria-label="Orbit trails"></div>
      </div>
      <div class="slider-cell">
        <label for="tilt-slider">Tilt</label>
        <div class="slider-wrap"><input type="range" id="tilt-slider" class="vertical-slider" min="0" max="360" value="0" aria-label="Orbit tilt"></div>
      </div>
      <div class="slider-cell">
        <label for="planet-radius-slider">P orbit</label>
        <div class="slider-wrap"><input type="range" id="planet-radius-slider" class="vertical-slider" min="48" max="240" value="115" aria-label="Planet orbit radius"></div>
      </div>
      <div class="slider-cell">
        <label for="moon-radius-slider">M orbit</label>
        <div class="slider-wrap"><input type="range" id="moon-radius-slider" class="vertical-slider" min="16" max="64" value="28" aria-label="Moon orbit radius"></div>
      </div>
      <div class="slider-cell">
        <label for="bg-slider">Bg</label>
        <div class="slider-wrap"><input type="range" id="bg-slider" class="vertical-slider" min="0" max="100" value="4" aria-label="Background color"></div>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
